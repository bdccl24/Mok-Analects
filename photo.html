<!DOCTYPE html>
<html>
<head>
    <title>莫語照片集 Mok Analects Photo Library</title>
    <style>
        .imagegrid {
            grid: none/repeat(3,auto);
        }
        .gfigure{
            max-height: 500px;
            text-align: center;
        }
        .gimage {
            text-align: center;
            max-width: 300px;
            max-height: 300px;
            border-radius: 9px;
        }
        figure {
            background-color: rgb(194, 226, 255);
        }
        
    </style>
</head>
<body>
    <button><a href="mokweb.html">Go back</a></button>
    <h1>莫語照片集 Mok Analects Photo Library</h1>
    <div id="polarph">
        <h2>Polar</h2>
        <div class="imagegrid" style="display: grid; justify-content: flex-start;">
            <figure class="gfigure">
                <img class="gimage" src="photos/nerdpolar.jpg">
                <figcaption style="text-align: center;" >Nerd Polar</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/phylabfront.jpeg">
                <figcaption style="text-align: center;" >Front View of Polar in Phy Lab</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/phylabside.jpeg">
                <figcaption style="text-align: center;" >Side View of Polar in Phy Lab</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/withmok.jpeg">
                <figcaption style="text-align: center;" >Polar with Mr. Mok</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/closeuppolar.jpg">
                <figcaption style="text-align: center;" >Close up of Polar</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/heldplasticpolarfront.JPG">
                <figcaption style="text-align: center;" >Front View of Plastic-wrapped Polar</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/heldplasticpolarside1.JPG">
                <figcaption style="text-align: center;" >Side View of Plastic-wrapped Polar</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/heldplasticpolarside2.JPG">
                <figcaption style="text-align: center;" >Side View of Plastic-wrapped Polar</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/mokholdpolar.JPG">
                <figcaption style="text-align: center;" >Mr. Mok holding Polar up</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/polarmarshmallow.JPG">
                <figcaption style="text-align: center;" >Polar with marshmallows</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/polarwithtie.jpg">
                <figcaption style="text-align: center;" >Polar wearing a tie</figcaption>
            </figure>
            <figure class="gfigure">
                <img class="gimage" src="photos/sidewayspolar.JPG">
                <figcaption style="text-align: center;" >Polar but sideways</figcaption>
            </figure>
        </div>    
    </div>
</body>
</html>
